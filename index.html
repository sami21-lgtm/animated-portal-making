<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="text-side">
            <h1 class="main-title">ANIMATED</h1>
            <h2 class="sub-title">LOGIN FORM</h2>
            <p class="tech-stack">using <span class="pink">HTML</span> & <span class="cyan">CSS</span></p>
            <div class="bg-number">02</div>
        </div>

        <div class="form-side">
            <div class="card" id="loginSection">
                <form id="loginForm">
                    <h2>Sign In</h2>
                    <div class="input-box">
                        <input type="text" id="user" required="required">
                        <span>Username</span>
                        <i></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="pass" required="required">
                        <span>Password</span>
                        <i></i>
                    </div>
                    <div class="links">
                        <a href="#">Forgot Password?</a>
                        <a href="#">Signup</a>
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                </form>
            </div>

            <div class="card hidden" id="profileSection">
                <div class="profile-content">
                    <img src="https://github.com/sami21-lgtm.png" alt="Profile" class="avatar">
                    <h3>MD. Emtiaz Hossain Sami</h3>
                    <p>Software Engineering Student</p>
                    <a href="https://github.com/sami21-lgtm" target="_blank" class="github-btn">Visit GitHub</a>
                    <button class="logout-btn" onclick="location.reload()">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
